name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  package-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Show toolchain
        run: xcodebuild -version
      - name: Verify tag matches marketing version
        if: github.ref_type == 'tag'
        run: |
          VERSION="$(sed -n 's/.*MARKETING_VERSION = \([^;]*\);/\1/p' DockPriority.xcodeproj/project.pbxproj | head -n 1)"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
      - name: Build
        run: >-
          xcodebuild build -project DockPriority.xcodeproj -scheme DockPriority
          -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO
      - name: Unit tests
        env:
          DOCKPRIORITY_DERIVED_DATA: ${{ runner.temp }}/DockPriority-unit-tests
          LLVM_PROFILE_FILE: ${{ runner.temp }}/DockPriority-unit-tests/default.profraw
        run: |
          xcodebuild build-for-testing \
            -project DockPriority.xcodeproj \
            -scheme DockPriority \
            -destination 'platform=macOS' \
            -derivedDataPath "$DOCKPRIORITY_DERIVED_DATA" \
            -only-testing:DockPriorityTests \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_DEBUG_DYLIB=YES
          UNIT_BUNDLE="$DOCKPRIORITY_DERIVED_DATA/Build/Products/Debug/DockPriority.app/Contents/PlugIns/DockPriorityTests.xctest"
          DEBUG_DYLIB="$DOCKPRIORITY_DERIVED_DATA/Build/Products/Debug/DockPriority.app/Contents/MacOS/DockPriority.debug.dylib"
          test -d "$UNIT_BUNDLE"
          test -f "$DEBUG_DYLIB"
          mkdir -p "$UNIT_BUNDLE/Contents/Frameworks"
          cp "$DEBUG_DYLIB" "$UNIT_BUNDLE/Contents/Frameworks/"
          xcrun xctest "$UNIT_BUNDLE"
      - name: Build and verify universal release
        run: scripts/package-release.sh --output build/package
      # actions/upload-artifact v7.0.1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: DockPriority-release
          path: build/package/
          if-no-files-found: error
          retention-days: 7

  publish:
    if: github.ref_type == 'tag'
    needs: package-and-test
    runs-on: macos-15
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # actions/download-artifact v8.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: DockPriority-release
          path: build/download
      - name: Re-verify downloaded release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          scripts/package-release.sh --verify \
            "build/download/DockPriority-${VERSION}-macos.zip" \
            "build/download/DockPriority-${VERSION}-macos.zip.sha256"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            "build/download/DockPriority-${VERSION}-macos.zip" \
            "build/download/DockPriority-${VERSION}-macos.zip.sha256" \
            --title "DockPriority ${VERSION}" \
            --notes "Universal Hardened Runtime ad-hoc-signed release. Not Developer ID signed or notarized; see README."
